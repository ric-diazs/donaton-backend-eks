name: CI/CD Donaton Backend EKS

on:
  push:
    branches: [ main ]
  
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------- Build de BBDD MySQL ----------
      - name: Build y push de BBDD MySQL
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose build db-mysql
          docker tag donaton-db:latest $ECR_REGISTRY/donaton-db:${IMAGE_TAG}
          docker push $ECR_REGISTRY/donaton-db:${IMAGE_TAG}

      # ---------- Build de Backend ----------
      - name: Build y push de Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose build backend-nextjs
          docker tag donaton-backend:latest $ECR_REGISTRY/donaton-backend:${IMAGE_TAG}
          docker push $ECR_REGISTRY/donaton-backend:${IMAGE_TAG}

      # ---------- Instalar kubectl ----------
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      # ---------- Configurar kubeconfig de EKS ----------
      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      # ---------- Aplicar manifests base ----------
      - name: Aplicar manifests base (namespace, DB, prisma, servicios)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/mysql-secret.yml -n $EKS_NAMESPACE
          kubectl apply -f k8s/prisma-secret.yml -n $EKS_NAMESPACE
          kubectl apply -f k8s/mysql-deployment.yml -n $EKS_NAMESPACE
          kubectl apply -f k8s/mysql-service.yml -n $EKS_NAMESPACE

      # ---------- Actualizar BACKEND en EKS ----------
      - name: Actualizar Backend en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend-deployment.yml -n $EKS_NAMESPACE
          kubectl apply -f k8s/backend-service.yml -n $EKS_NAMESPACE
          kubectl set image deployment/donaton-backend backend=$ECR_REGISTRY/donaton-backend:${IMAGE_TAG} -n $EKS_NAMESPACE
          kubectl rollout status deployment/tienda-backend -n $EKS_NAMESPACE

      # ---------- HPA (si existen los YAML) ----------
      - name: Aplicar HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/backend-hpa.yaml -n $EKS_NAMESPACE

      # ---------- Ver estado final ----------
      - name: Ver pods y servicios
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE

