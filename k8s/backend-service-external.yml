apiVersion: v1
kind: Service
metadata:
  name: donaton-backend
  namespace: donaton
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: nlb
spec:
  selector:
    app: donaton-backend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
