apiVersion: apps/v1
kind: Deployment
metadata:
  name: donaton-backend
  namespace: donaton
spec:
  replicas: 2
  selector:
    matchLabels:
      app: donaton-backend
  template:
    metadata:
      labels:
        app: donaton-backend
    spec:
      containers:
      - name: api-nextjs
        image: 471112695829.dkr.ecr.us-east-1.amazonaws.com/donaton-backend:eks-v1 # Modifica el ID con el de tu cuenta
        ports:
          - containerPort: 3000
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: prisma-secret
                key: DATABASE_URL
          - name: SHADOW_DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: prisma-secret
                key: SHADOW_DATABASE_URL
        
        command: ["sh", "-c", "npx prisma generate && npx prisma db push && node server.js"]
        
        # Recursos para que extension Metrics Server calcule el % de CPU y Memoria para escalar
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"


