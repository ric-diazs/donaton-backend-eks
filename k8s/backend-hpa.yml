apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: donaton-backend-hpa
  namespace: donaton
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: donaton-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
